# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: ai-foundry-starter-basic
services:
    certforge:
        project: certforge
        host: azure.ai.agent
        language: python
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
            deployments:
                - model:
                    format: OpenAI-OSS
                    name: gpt-oss-120b
                    version: "1"
                  name: gpt-oss-120b
                  sku:
                    capacity: 1
                    name: GlobalStandard
infra:
    provider: bicep
    path: ./infra
